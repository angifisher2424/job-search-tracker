<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Search Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efea;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9a9a95;
  --border:rgba(0,0,0,0.11);--border2:rgba(0,0,0,0.20);
  --r:8px;--rl:12px;
  --font:-apple-system,'Helvetica Neue',Arial,sans-serif;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --purple:#3C3489;--purple-bg:#EEEDFE;
  --gray:#5F5E5A;--gray-bg:#F1EFE8;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --teal:#0F6E56;--teal-bg:#E1F5EE;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0efe8;--text2:#a0a09a;--text3:#6a6a65;
    --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);
    --blue-bg:#0c2a4a;--blue-text:#7ab5f0;
    --amber-bg:#3d2400;--green-bg:#1a3008;--purple-bg:#1e1a4a;
    --gray-bg:#2a2a28;--red-bg:#3d1010;--teal-bg:#0a2e25;
  }
}
body{font-family:var(--font);background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.75rem 1.25rem 5rem}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:12px}
.nav-left{display:flex;align-items:center;gap:14px}
.nav h1{font-size:19px;font-weight:600}
.nav-badge{font-size:10px;background:var(--blue-bg);color:var(--blue-text);padding:3px 8px;border-radius:20px;font-weight:600}
.nav-tabs{display:flex;gap:3px;background:var(--bg2);border-radius:var(--r);padding:3px;border:0.5px solid var(--border)}
.nav-tab{padding:7px 13px;font-size:12px;font-weight:500;border:none;background:none;color:var(--text2);border-radius:6px;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.nav-tab.active{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.nav-actions{display:flex;gap:8px;align-items:center}
.icon-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--r);padding:7px 12px;font-size:12px;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all .12s;display:flex;align-items:center;gap:5px}
.icon-btn:hover{background:var(--bg2);color:var(--text)}
.icon-btn.primary{background:var(--text);color:var(--bg);border-color:transparent}
.icon-btn.primary:hover{opacity:.85}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.75rem}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer;transition:border-color .15s}
.stat:hover{border-color:var(--border2)}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.stat-value{font-size:23px;font-weight:600}
.stat-value.blue{color:var(--blue)}.stat-value.amber{color:#9a5c0a}.stat-value.green{color:var(--green)}.stat-value.purple{color:var(--purple)}.stat-value.red{color:var(--red)}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px}
.stat-sub.urgent{color:var(--red);font-weight:500}

/* TOOLBAR */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:10px;flex-wrap:wrap}
.search-row{display:flex;gap:8px;flex-wrap:wrap}
.search-row input,.search-row select{border:0.5px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-size:13px;background:var(--bg);color:var(--text);font-family:var(--font);outline:none}
.search-row input{width:190px}
.search-row input:focus,.search-row select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.add-btn{background:var(--text);color:var(--bg);border:none;border-radius:var(--r);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:opacity .15s}
.add-btn:hover{opacity:.82}

/* TABLE */
.table-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{font-size:10px;font-weight:600;color:var(--text2);text-align:left;padding:10px 13px;border-bottom:0.5px solid var(--border);background:var(--bg2);text-transform:uppercase;letter-spacing:.05em}
td{padding:11px 13px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:top;word-break:break-word}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.name-strong{font-weight:500}
.sub-text{font-size:11px;color:var(--text2);margin-top:2px}
.due-chip{font-size:11px;border-radius:6px;padding:3px 8px;display:inline-block;white-space:nowrap}
.due-overdue{background:var(--red-bg);color:var(--red)}.due-soon{background:var(--amber-bg);color:var(--amber)}.due-ok{background:var(--green-bg);color:var(--green)}
.ai-rec{font-size:11px;background:var(--teal-bg);color:var(--teal);border-radius:6px;padding:3px 7px;display:inline-block;margin-top:4px;cursor:pointer}
.ai-rec:hover{opacity:.8}

/* BADGES */
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge-applied{background:var(--blue-bg);color:var(--blue-text)}.badge-interviewing{background:var(--amber-bg);color:var(--amber)}
.badge-networking{background:var(--purple-bg);color:var(--purple)}.badge-offer{background:var(--green-bg);color:var(--green)}
.badge-declined{background:var(--gray-bg);color:var(--gray)}.badge-waiting{background:var(--amber-bg);color:var(--amber)}
.badge-rejected{background:var(--red-bg);color:var(--red)}
.resume-tag{background:var(--green-bg);color:var(--green);font-size:11px;padding:3px 9px;border-radius:20px;display:inline-block;font-weight:500}

/* ACTION BTNS */
.action-btn{background:none;border:0.5px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--font);margin-right:3px;margin-bottom:3px;transition:all .12s;display:inline-block}
.action-btn:hover{background:var(--bg2);color:var(--text)}
.action-btn.danger:hover{background:var(--red-bg);color:var(--red);border-color:#F09595}
.action-btn.ai-btn{border-color:var(--teal);color:var(--teal)}
.action-btn.ai-btn:hover{background:var(--teal-bg)}

/* EMPTY */
.empty{text-align:center;padding:3.5rem 1rem;color:var(--text2)}
.empty-icon{font-size:32px;margin-bottom:12px}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(7,minmax(140px,1fr));gap:9px;overflow-x:auto;padding-bottom:1rem}
@media(max-width:800px){.kanban{grid-template-columns:repeat(3,minmax(140px,1fr))}}
.k-col{background:var(--bg2);border-radius:var(--r);padding:9px;min-height:180px;border:0.5px solid var(--border)}
.k-col-header{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.k-count{background:var(--bg);border-radius:20px;padding:1px 7px;font-size:10px;color:var(--text2)}
.k-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:9px;margin-bottom:7px;cursor:pointer;transition:box-shadow .12s}
.k-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.k-card-name{font-size:12px;font-weight:500;margin-bottom:2px}
.k-card-co{font-size:11px;color:var(--text2)}
.k-card-due{font-size:10px;margin-top:5px}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
@media(max-width:600px){.dash-grid{grid-template-columns:1fr}}
.dash-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.2rem}
.dash-card h3{font-size:11px;font-weight:600;margin-bottom:.9rem;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.dash-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.dash-row:last-child{border-bottom:none}
.dash-num{font-weight:600;font-size:14px}
.reminder-item{padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12px}
.reminder-item:last-child{border-bottom:none}
.reminder-name{font-weight:500}
.reminder-meta{color:var(--text2);font-size:11px;margin-top:2px}
.bar-wrap{background:var(--bg2);border-radius:4px;height:5px;margin-top:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}

/* RESUME LIBRARY */
.resume-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.resume-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.2rem}
.resume-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.resume-card-name{font-weight:600;font-size:14px}
.resume-card-meta{font-size:11px;color:var(--text2);margin-top:3px}
.resume-card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.resume-card-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--text2)}
.resume-card-used{font-size:11px;color:var(--green);margin-top:8px}
.resume-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--blue);text-decoration:none;margin-top:8px;font-weight:500}
.resume-link:hover{text-decoration:underline}
.source-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;background:var(--bg2);color:var(--text2);white-space:nowrap}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border);padding:1.75rem;width:580px;max-width:100%;max-height:93vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.modal-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);margin-bottom:1.25rem}
.modal-tab{padding:8px 14px;font-size:12px;font-weight:500;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;font-family:var(--font)}
.modal-tab.active{color:var(--text);border-bottom-color:var(--text)}
.form-row{margin-bottom:13px}
.form-row label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;border:0.5px solid var(--border2);border-radius:var(--r);padding:9px 12px;font-size:13px;background:var(--bg);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s,box-shadow .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.form-row textarea{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--border);flex-wrap:wrap}
.btn-cancel{background:none;border:0.5px solid var(--border2);border-radius:var(--r);padding:9px 16px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font)}
.btn-save{background:var(--text);color:var(--bg);border:none;border-radius:var(--r);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.btn-save:hover,.btn-ai:hover{opacity:.85}
.btn-ai{background:var(--blue);color:#fff;border:none;border-radius:var(--r);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.btn-ai:disabled{opacity:.45;cursor:not-allowed}
.btn-teal{background:var(--teal);color:#fff;border:none;border-radius:var(--r);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.btn-teal:hover{opacity:.85}
.btn-teal:disabled{opacity:.45;cursor:not-allowed}

/* AI PANEL */
.ai-panel{background:var(--bg2);border-radius:var(--r);border:0.5px solid var(--border);padding:1rem;margin-top:10px}
.ai-panel-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.ai-output{font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--text);min-height:80px}
.ai-output.loading{color:var(--text3);font-style:italic}
.ai-controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.copy-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--r);padding:6px 12px;font-size:12px;cursor:pointer;color:var(--text2);font-family:var(--font)}
.copy-btn:hover{background:var(--bg);color:var(--text)}
.tone-select{border:0.5px solid var(--border2);border-radius:var(--r);padding:6px 10px;font-size:12px;background:var(--bg);color:var(--text);font-family:var(--font);outline:none}

/* NEXT STEP RECOMMENDATION */
.rec-box{background:var(--teal-bg);border:0.5px solid rgba(15,110,86,.2);border-radius:var(--r);padding:.9rem 1rem;margin-top:10px}
.rec-box-label{font-size:10px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.rec-box-text{font-size:13px;color:var(--text);line-height:1.6}
.rec-box-apply{font-size:12px;color:var(--teal);cursor:pointer;margin-top:6px;font-weight:500;display:inline-block}
.rec-box-apply:hover{text-decoration:underline}

/* INTERVIEW PREP */
.prep-section{margin-bottom:1rem}
.prep-section h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);margin-bottom:8px}
.q-item{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:0.5px solid var(--border)}
.q-item:last-child{border-bottom:none}
.q-check{width:15px;height:15px;border:0.5px solid var(--border2);border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:3px;accent-color:var(--blue)}
.q-text{font-size:13px;flex:1}
.q-answer input{width:100%;margin-top:4px;border:0.5px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;background:var(--bg);color:var(--text);font-family:var(--font);outline:none}

/* AUTO DATE HINT */
.date-hint{font-size:11px;color:var(--blue);margin-top:4px;cursor:pointer}
.date-hint:hover{text-decoration:underline}

/* GMAIL / CALENDAR */
.integration-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:13px}
.integration-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.integration-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.integration-title{font-weight:600;font-size:14px}
.integration-sub{font-size:12px;color:var(--text2)}
.digest-preview{background:var(--bg2);border-radius:var(--r);padding:1rem;font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto;border:0.5px solid var(--border);margin-top:10px}
.cal-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.cal-item:last-child{border-bottom:none}
.cal-check{accent-color:var(--blue);width:14px;height:14px;margin-right:8px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.section-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
.add-resume-btn{background:none;border:1.5px dashed var(--border2);border-radius:var(--rl);padding:2rem;text-align:center;cursor:pointer;color:var(--text2);font-size:13px;font-family:var(--font);width:100%;transition:all .12s}
.add-resume-btn:hover{border-color:var(--blue);color:var(--blue)}
.action-bar{display:flex;gap:8px;margin-top:1.25rem;flex-wrap:wrap}
.bar-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--r);padding:7px 13px;font-size:12px;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all .12s}
.bar-btn:hover{background:var(--bg2);color:var(--text)}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <div class="nav-left">
      <h1>Job Search Tracker</h1>
      <span class="nav-badge">v3 · AI-powered</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchView('dashboard')">Dashboard</button>
      <button class="nav-tab" onclick="switchView('contacts')">Contacts</button>
      <button class="nav-tab" onclick="switchView('applications')">Applications</button>
      <button class="nav-tab" onclick="switchView('kanban')">Pipeline</button>
      <button class="nav-tab" onclick="switchView('resumes')">Resumes</button>
      <button class="nav-tab" onclick="switchView('integrations')">Integrations</button>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" onclick="exportJSON()" title="Backup data">💾 Backup</button>
      <button class="icon-btn" onclick="document.getElementById('json-file-input').click()" title="Restore">↩ Restore</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div id="main-view"></div>
  <div class="action-bar" id="action-bar"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="csv-file-input" accept=".csv" style="display:none" onchange="handleCSVImport(event)">
<input type="file" id="json-file-input" accept=".json" style="display:none" onchange="handleJSONRestore(event)">

<script>
// ── PROFILE (pre-loaded with Angi's context for AI prompts) ──
const PROFILE = {

  background: 'Senior Managing Consultant with 20+ years in enterprise transformation, AI strategy, and DEI implementation. Clients include Nike, Kaiser Permanente, and Wells Fargo. Recently transitioned from Point B Consulting. Board Chair of WCRC. Oakland-based.',

// ── SMART FOLLOW-UP RULES ──

// ── DATA ──

const DEF = {

  ],
  applications:[
    {id:uid(),name:'Chief of Staff',company:'OpenAI',role:'Chief of Staff',status:'Applied',outreachDate:'2026-03-20',followUpDate:'2026-03-27',nextStep:'Awaiting response',notes:'Strong alignment with AI strategy background',source:'Job board',referrer:'',resume:'CoS / Strategic Ops Resume',interviewPrep:'{}',emailDrafts:'',aiRec:'',aiRecTs:''},
    {id:uid(),name:'Head of Global Transformation',company:'Grant Thornton',role:'Head of Global Transformation Office',status:'Applied',outreachDate:'2026-03-28',followUpDate:'2026-04-04',nextStep:'Follow up this week',notes:'Consulting background strong fit',source:'LinkedIn',referrer:'',resume:'Executive Consulting Resume',interviewPrep:'{}',emailDrafts:'',aiRec:'',aiRecTs:''},
  ],
  resumes:[
    {id:uid(),name:'Executive Consulting Resume',version:'v3',targetRole:'Management Consulting / Transformation',lastUpdated:'2026-03-15',notes:'20 years exp, Nike/KP/WF clients highlighted',tags:['consulting','transformation','Fortune 500'],driveUrl:''},
    {id:uid(),name:'CoS / Strategic Ops Resume',version:'v2',targetRole:'Chief of Staff / COO',lastUpdated:'2026-03-20',notes:'Emphasizes cross-functional leadership and AI strategy',tags:['CoS','COO','AI strategy','ops'],driveUrl:''},
  ]
};

let contacts     = JSON.parse(localStorage.getItem('jst3_c')||'null') || DEF.contacts;
let applications = JSON.parse(localStorage.getItem('jst3_a')||'null') || DEF.applications;
let resumes      = JSON.parse(localStorage.getItem('jst3_r')||'null') || DEF.resumes;
let currentView  = 'dashboard';
let editIndex    = null;
let editTarget   = null;

function save(){
  localStorage.setItem('jst3_c', JSON.stringify(contacts));
  localStorage.setItem('jst3_a', JSON.stringify(applications));
  localStorage.setItem('jst3_r', JSON.stringify(resumes));
}
function getData(tab){ return tab==='contacts' ? contacts : applications }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2400) }
function today(){ return new Date().toISOString().slice(0,10) }
function addDays(d,n){ const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10) }
function daysDiff(dateStr){ return Math.ceil((new Date(dateStr)-new Date(today()))/(86400000)) }

function dueLabel(dateStr){
  if(!dateStr) return '';
  const d=daysDiff(dateStr);
  if(d<0)  return `<span class="due-chip due-overdue">${Math.abs(d)}d overdue</span>`;
  if(d===0) return `<span class="due-chip due-overdue">Due today</span>`;
  if(d<=3)  return `<span class="due-chip due-soon">Due in ${d}d</span>`;
  return `<span class="due-chip due-ok">${dateStr}</span>`;
}

function statusBadge(s){
  const m={Applied:'applied',Interviewing:'interviewing',Networking:'networking',Offer:'offer',Declined:'declined',Waiting:'waiting',Rejected:'rejected'};
  return `<span class="badge badge-${m[s]||'applied'}">${s}</span>`;
}

// ── AUTO FOLLOW-UP DATE ──
function autoFollowUpDate(status, fromDate){
  const days = FOLLOWUP_DAYS[status];
  if(!days) return '';
  return addDays(fromDate || today(), days);
}

// ── AI CALL ──
async function callAI(prompt, maxTokens=600){
  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      messages:[{role:'user',content:prompt}]
    })
  });
  const data = await resp.json();
  return data.content?.find(b=>b.type==='text')?.text || 'Could not generate response.';
}

// ── STATS ──
function updateStats(){
  const all=[...contacts,...applications];
  const iv=all.filter(i=>i.status==='Interviewing').length;

  const of=all.filter(i=>i.status==='Offer').length;

// ── VIEW ROUTER ──
function switchView(view){
  currentView=view;
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{
    const views=['dashboard','contacts','applications','kanban','resumes','integrations'];
    t.classList.toggle('active',views[i]===view);
  });
  render();
}

function render(){

  else if(currentView==='kanban')    renderKanban();

async function getAIRec(idx, tab){
  const r=getData(tab)[idx];
  toast('Getting AI recommendation…');
  const prompt=`You are a career coach helping ${PROFILE.name}, a ${PROFILE.background}

This person has the following job search entry:
- Name/Role: ${r.name} at ${r.company}
- Status: ${r.status}
- Last contact: ${r.outreachDate||'unknown'}
- Follow-up date: ${r.followUpDate||'not set'}
- Their notes: ${r.notes||'none'}
- Current next step: ${r.nextStep||'none'}

Based on the status "${r.status}" and how many days have passed, give ONE specific, actionable next step recommendation. Be concrete. Max 2 sentences. No preamble.`;

  try{
    const rec = await callAI(prompt, 150);
    getData(tab)[idx].aiRec = rec;
    getData(tab)[idx].aiRecTs = today();
    save();
    render();
    showRecModal(idx, tab);

}

async function generateDigest(){
  const btn=document.getElementById('digest-btn');
  const preview=document.getElementById('digest-preview');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Generating…';
  preview.style.display='block';
  preview.textContent='Generating your digest…';

  const all=[...contacts,...applications];
  const due=all.filter(r=>r.followUpDate&&!['Declined','Rejected','Offer'].includes(r.status))
    .sort((a,b)=>a.followUpDate.localeCompare(b.followUpDate)).slice(0,8);
  const overdue=due.filter(r=>daysDiff(r.followUpDate)<0);
  const upcoming=due.filter(r=>daysDiff(r.followUpDate)>=0);

  const prompt=`Write a professional weekly digest email that ${PROFILE.name} would send to herself as a job search check-in.

Her profile: ${PROFILE.background}

Overdue follow-ups (${overdue.length}):
${overdue.map(r=>`- ${r.name} @ ${r.company} (${r.status}) — ${r.nextStep||'follow up'} — was due ${r.followUpDate}`).join('\n')||'None'}

Upcoming follow-ups this week (${upcoming.length}):
${upcoming.map(r=>`- ${r.name} @ ${r.company} (${r.status}) — ${r.nextStep||'follow up'} — due ${r.followUpDate}`).join('\n')||'None'}

Total tracked: ${all.length} entries. Interviewing: ${all.filter(r=>r.status==='Interviewing').length}. Applied: ${all.filter(r=>r.status==='Applied').length}.

Write the email with:
- Subject line
- Brief encouraging opener (1-2 sentences)
- Overdue section (if any)
- This week's priorities
- A motivating closing line
Keep it concise and action-oriented. Sign as Angi.`;

  try{
    const text = await callAI(prompt, 700);
    preview.textContent = text;
    window._digestText = text;
    document.getElementById('send-digest-btn').style.display='inline-block';
  }catch(e){
    preview.textContent = 'Could not generate digest. Check your connection.';
  }
  btn.disabled=false; btn.innerHTML='✨ Preview digest';
}

async function sendDigest(){
  const text = window._digestText || '';
  if(!text){ toast('Generate a preview first'); return; }

  const lines = text.split('\n');
  const subjectLine = lines.find(l=>l.toLowerCase().startsWith('subject:'));
  const subject = subjectLine ? subjectLine.replace(/^subject:\s*/i,'') : 'Job Search Weekly Digest';
  const body = encodeURIComponent(text);
  const subj = encodeURIComponent(subject);
  const mailto = `mailto:me?subject=${subj}&body=${body}`;
  window.location.href = mailto;
  toast('Opening your email client…');
}

async function createCalendarEvents(indices){
  const due = window._digestDue || [];
  const selected = indices.filter(i=>document.getElementById('cal-'+i)?.checked).map(i=>due[i]).filter(Boolean);
  if(!selected.length){ toast('Select at least one follow-up'); return; }

  let created=0;
  for(const r of selected){
    const title = encodeURIComponent(`Follow up: ${r.name} @ ${r.company}`);
    const desc = encodeURIComponent(`${r.nextStep||'Follow up'}\nStatus: ${r.status}\nNotes: ${r.notes||''}`);
    const date = r.followUpDate.replace(/-/g,'');
    const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${date}/${date}&details=${desc}`;
    window.open(url,'_blank');
    created++;
    await new Promise(res=>setTimeout(res,400));
  }
  toast(`Opened ${created} calendar event${created>1?'s':''} in Google Calendar`);
}

function openModal(idx, tab){
  editIndex=idx; editTarget=tab||currentView;
  if(['dashboard','kanban','integrations'].includes(editTarget)) editTarget='applications';
  const data=getData(editTarget);
  const r=editIndex!==null?data[editIndex]:{};
  const isApp=editTarget==='applications';
  const autoDate=autoFollowUpDate(r.status||'Networking', r.outreachDate);
  const resumeOpts=resumes.map(rv=>`<option ${r.resume===rv.name?'selected':''}>${esc(rv.name)}</option>`).join('');

  showOverlay(`
    <div class="modal">
      <h2>${editIndex!==null?'Edit entry':'Add new entry'}</h2>
      <div class="form-grid">
        <div class="form-row"><label>${isApp?'Role title':'Contact name'}</label><input id="f-name" value="${esc(r.name||'')}"></div>
        <div class="form-row"><label>Company</label><input id="f-company" value="${esc(r.company||'')}"></div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label>${isApp?'Full title':'Their role'}</label><input id="f-role" value="${esc(r.role||'')}"></div>
        <div class="form-row"><label>Status</label>
          <select id="f-status" onchange="onStatusChange(this.value)">
            ${['Networking','Applied','Interviewing','Waiting','Offer','Declined','Rejected'].map(s=>`<option ${r.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label>${isApp?'Date applied':'Outreach date'}</label><input id="f-date" type="date" value="${r.outreachDate||today()}" onchange="onDateChange(this.value)"></div>
        <div class="form-row">
          <label>Follow-up date</label>
          <input id="f-followup" type="date" value="${r.followUpDate||autoDate}">
          <div class="date-hint" id="date-hint" onclick="applyAutoDate()">✨ Auto-set based on status</div>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label>Resume used</label>
          <select id="f-resume"><option value="">— none —</option>${resumeOpts}</select>
        </div>
        <div class="form-row"><label>How we connected</label>
          <select id="f-source">
            ${['','LinkedIn','Referral','Event / conference','Cold outreach','Recruiter','Job board','Battery SF','WCRC network','Point B network','Other'].map(s=>`<option ${r.source===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label>Next step</label><input id="f-nextstep" placeholder="e.g. Follow up Friday…" value="${esc(r.nextStep||'')}"></div>
        <div class="form-row"><label>Referred by</label><input id="f-referrer" placeholder="e.g. Srividya" value="${esc(r.referrer||'')}"></div>
      </div>
      <div class="form-row"><label>Notes</label><textarea id="f-notes">${esc(r.notes||'')}</textarea></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveEntry()">Save entry</button>
      </div>
    </div>`);
  document.getElementById('f-name').focus();
}

function onStatusChange(status){
  const fromDate=document.getElementById('f-date').value||today();
  const auto=autoFollowUpDate(status,fromDate);
  if(auto) document.getElementById('f-followup').value=auto;
}

function onDateChange(dateVal){
  const status=document.getElementById('f-status').value;
  const auto=autoFollowUpDate(status,dateVal);
  if(auto) document.getElementById('f-followup').value=auto;
}

function applyAutoDate(){
  const status=document.getElementById('f-status').value;
  const fromDate=document.getElementById('f-date').value||today();
  const auto=autoFollowUpDate(status,fromDate);
  if(auto){ document.getElementById('f-followup').value=auto; toast('Follow-up date auto-set'); }
}

function saveEntry(){
  const entry={
    id:(editIndex!==null?getData(editTarget)[editIndex].id:null)||uid(),
    name:document.getElementById('f-name').value.trim(),
    company:document.getElementById('f-company').value.trim(),
    role:document.getElementById('f-role').value.trim(),
    status:document.getElementById('f-status').value,
    outreachDate:document.getElementById('f-date').value,
    followUpDate:document.getElementById('f-followup').value,
    resume:document.getElementById('f-resume').value,
    source:document.getElementById('f-source').value,
    referrer:document.getElementById('f-referrer').value.trim(),
    nextStep:document.getElementById('f-nextstep').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
    interviewPrep:editIndex!==null?(getData(editTarget)[editIndex].interviewPrep||'{}'):'{}',
    emailDrafts:'',
    aiRec:editIndex!==null?(getData(editTarget)[editIndex].aiRec||''):'',
    aiRecTs:editIndex!==null?(getData(editTarget)[editIndex].aiRecTs||''):'',
  };
  if(!entry.name){document.getElementById('f-name').focus();return;}
  const data=getData(editTarget);
  if(editIndex!==null){data[editIndex]=entry;}else{data.push(entry);}
  save(); closeModal(); render();
  toast(editIndex!==null?'Entry updated':'Entry added');
}

function deleteEntry(idx,tab){
  if(!confirm('Delete this entry?')) return;
  getData(tab).splice(idx,1); save(); render(); toast('Entry deleted');
}

// ── EMAIL MODAL ──
function openEmailModal(idx,tab){
  const r=getData(tab)[idx];
  showOverlay(`
    <div class="modal">
      <h2>✉ Draft outreach email</h2>
      <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">For <strong>${esc(r.name)}</strong> at <strong>${esc(r.company)}</strong></p>
      <div class="form-grid">
        <div class="form-row"><label>Email type</label>
          <select id="email-type">
            <option>Cold outreach / introduction</option>
            <option>Follow-up after applying</option>
            <option>Follow-up after interview</option>
            <option>Thank you note</option>
            <option>Reconnect with old contact</option>
            <option>Request informational interview</option>
          </select>
        </div>
        <div class="form-row"><label>Tone</label>
          <select id="email-tone">
            <option>Professional and warm</option>
            <option>Concise and direct</option>
            <option>Enthusiastic</option>
            <option>Formal</option>
          </select>
        </div>
      </div>
      <div class="form-row"><label>Additional context</label>
        <textarea id="email-ctx" placeholder="e.g. We met at the Battery SF event last month…" style="min-height:55px"></textarea>
      </div>
      <button class="btn-ai" id="gen-btn" onclick="generateEmail(${idx},'${tab}')">✨ Generate email</button>
      <div class="ai-panel" style="margin-top:10px">
        <div class="ai-panel-label">Generated email</div>
        <div class="ai-output loading" id="ai-out">Your email will appear here…</div>
      </div>
      <div class="ai-controls">
        <button class="copy-btn" onclick="copyText('ai-out')">Copy</button>
        <button class="copy-btn" onclick="mailtoEmail('ai-out')">Open in Mail</button>
        <button class="copy-btn" onclick="generateEmail(${idx},'${tab}')">Regenerate</button>
      </div>
      <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Close</button></div>
    </div>`);
}

async function generateEmail(idx,tab){
  const r=getData(tab)[idx];
  const type=document.getElementById('email-type').value;
  const tone=document.getElementById('email-tone').value;
  const ctx=document.getElementById('email-ctx').value;
  const out=document.getElementById('ai-out');
  const btn=document.getElementById('gen-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Generating…';
  out.textContent=''; out.classList.add('loading');

  const prompt=`You are helping ${PROFILE.name}: ${PROFILE.background}

Write a ${type} email to ${r.name} (${r.role||'professional'}) at ${r.company}.
Tone: ${tone}.
${ctx?`Context: ${ctx}`:''}
${r.notes?`About this contact: ${r.notes}`:''}

Include a subject line. Be concise, authentic, not generic. Sign as Angi Fisher.`;

  try{
    out.textContent = await callAI(prompt, 700);
    out.classList.remove('loading');
  }catch(e){ out.textContent='Error — please try again.'; }
  btn.disabled=false; btn.innerHTML='✨ Generate email';
}

function copyText(id){
  const text=document.getElementById(id)?.textContent||'';
  navigator.clipboard.writeText(text).then(()=>toast('Copied!'));
}

function mailtoEmail(id){
  const text=document.getElementById(id)?.textContent||'';
  const lines=text.split('\n');
  const subLine=lines.find(l=>l.toLowerCase().startsWith('subject:'));
  const subj=encodeURIComponent(subLine?subLine.replace(/^subject:\s*/i,''):'Following up');
  const body=encodeURIComponent(text);
  window.location.href=`mailto:?subject=${subj}&body=${body}`;
}

// ── INTERVIEW PREP MODAL ──
const BASE_QUESTIONS={
  behavioral:['Tell me about yourself and your consulting background.','Why are you interested in this role/company?','Describe a major enterprise transformation you led.','Tell me about navigating organizational resistance.','How do you manage competing high-priority initiatives?','Describe influencing without authority.','Tell me about a time you led through ambiguity.'],
  roleSpecific:['What does success look like in the first 90 days?','How do you build trust with a new executive team?','Walk me through your AI strategy experience.','How have you implemented DEI at scale?','Describe your stakeholder alignment approach.','How do you handle board or C-suite dynamics?'],
  yourQuestions:['What are the biggest challenges the team faces right now?','How does leadership define success for this role?','What does the culture look like day-to-day?','What would the first 30 days look like?','How does this role interact with the board / senior leadership?'],
};

function openPrepModal(idx,tab){
  const r=getData(tab)[idx];
  let prep={}; try{ prep=JSON.parse(r.interviewPrep||'{}'); }catch(e){}
  showOverlay(`
    <div class="modal" style="width:640px">
      <h2>📝 Interview prep — ${esc(r.name)} @ ${esc(r.company)}</h2>
      <div class="modal-tabs">
        <button class="modal-tab active" onclick="showPrepTab('behavioral',this)">Behavioral</button>
        <button class="modal-tab" onclick="showPrepTab('roleSpecific',this)">Role-specific</button>
        <button class="modal-tab" onclick="showPrepTab('yourQuestions',this)">Your questions</button>
        <button class="modal-tab" onclick="showPrepTab('aiGenerate',this)">✨ AI questions</button>
        <button class="modal-tab" onclick="showPrepTab('notes',this)">Notes</button>
      </div>
      <div id="prep-content"></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Close</button>
        <button class="btn-save" onclick="savePrepNotes(${idx},'${tab}')">Save notes</button>
      </div>
    </div>`);
  window._prep={idx,tab,prep,entry:r};
  showPrepTab('behavioral',document.querySelector('.modal-tab'));
}

function showPrepTab(section,btn){
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const {prep,entry}=window._prep;
  const el=document.getElementById('prep-content');

  if(section==='notes'){
    el.innerHTML=`
      <div class="form-row"><label>Interview notes & key talking points</label><textarea id="prep-notes" style="min-height:140px">${esc(prep.notes||'')}</textarea></div>
      <div class="form-row"><label>STAR examples to use</label><textarea id="prep-stories" style="min-height:100px">${esc(prep.stories||'')}</textarea></div>`;
    return;
  }

  if(section==='aiGenerate'){
    el.innerHTML=`
      <div class="form-row"><label>Job description (paste here for tailored questions)</label>
        <textarea id="jd-text" style="min-height:100px" placeholder="Paste the job description or key requirements here…">${esc(prep.jdText||'')}</textarea>
      </div>
      <button class="btn-ai" id="ai-q-btn" onclick="generatePrepQuestions()">✨ Generate tailored questions</button>
      <div class="ai-panel" style="margin-top:10px;display:${prep.aiQuestions?'block':'none'}" id="ai-q-panel">
        <div class="ai-panel-label">AI-generated questions</div>
        <div class="ai-output" id="ai-q-out">${esc(prep.aiQuestions||'')}</div>
      </div>
      <div class="ai-controls" style="margin-top:8px">
        <button class="copy-btn" onclick="copyText('ai-q-out')">Copy questions</button>
      </div>`;
    return;
  }

  const questions=BASE_QUESTIONS[section]||[];
  el.innerHTML=`<div class="prep-section">
    ${questions.map((q,i)=>{
      const key=`${section}_${i}`;
      return `<div class="q-item">
        <input type="checkbox" class="q-check" id="q-${key}" ${prep[key]?'checked':''} onchange="window._prep.prep['${key}']=this.checked">
        <div class="q-text" style="flex:1">${esc(q)}
          <div class="q-answer"><input id="qa-${key}" placeholder="Your talking points…" value="${esc(prep['ans_'+key]||'')}"></div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

async function generatePrepQuestions(){
  const {entry,prep}=window._prep;
  const jd=document.getElementById('jd-text').value.trim();
  prep.jdText=jd;
  const btn=document.getElementById('ai-q-btn');
  const panel=document.getElementById('ai-q-panel');
  const out=document.getElementById('ai-q-out');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Generating…';
  panel.style.display='block';
  out.textContent='Generating tailored questions…';

  const prompt=`You are a career coach preparing ${PROFILE.name} (${PROFILE.background}) for a job interview.

Role: ${entry.name||entry.role} at ${entry.company}
${jd?`Job description:\n${jd}`:'No JD provided — generate general senior leadership questions.'}

Generate 8-10 specific, insightful interview questions Angi is likely to face, tailored to this role and her background. 
Also include 3-4 questions she should ask them.
Format clearly with sections: "Questions you'll likely face" and "Questions to ask them".
Be specific to the role and company, not generic.`;

  try{
    const text=await callAI(prompt,800);
    out.textContent=text;
    prep.aiQuestions=text;
  }catch(e){ out.textContent='Could not generate — try again.'; }
  btn.disabled=false; btn.innerHTML='✨ Generate tailored questions';
}

function savePrepNotes(idx,tab){
  const {prep}=window._prep;
  document.querySelectorAll('[id^="qa-"]').forEach(el=>{ prep['ans_'+el.id.replace('qa-','')]=el.value; });
  if(document.getElementById('prep-notes')) prep.notes=document.getElementById('prep-notes').value;
  if(document.getElementById('prep-stories')) prep.stories=document.getElementById('prep-stories').value;
  if(document.getElementById('jd-text')) prep.jdText=document.getElementById('jd-text').value;
  getData(tab)[idx].interviewPrep=JSON.stringify(prep);
  save(); closeModal(); toast('Prep notes saved');
}

  showOverlay(`
    <div class="modal">
      <h2>${idx!==null?'Edit resume':'Add resume'}</h2>
      <div class="form-grid">
        <div class="form-row"><label>Resume name</label><input id="rv-name" value="${esc(r.name||'')}"></div>
        <div class="form-row"><label>Version</label><input id="rv-ver" placeholder="v3" value="${esc(r.version||'')}"></div>

      <div class="form-row"><label>Key highlights / notes</label><textarea id="rv-notes">${esc(r.notes||'')}</textarea></div>

function saveResume(idx){
  const entry={id:idx!==null?resumes[idx].id:uid(),name:document.getElementById('rv-name').value.trim(),version:document.getElementById('rv-ver').value.trim(),targetRole:document.getElementById('rv-role').value.trim(),lastUpdated:document.getElementById('rv-date').value,notes:document.getElementById('rv-notes').value.trim(),tags:document.getElementById('rv-tags').value.split(',').map(t=>t.trim()).filter(Boolean),driveUrl:document.getElementById('rv-drive').value.trim()};
  if(!entry.name){document.getElementById('rv-name').focus();return;}
  if(idx!==null){resumes[idx]=entry;}else{resumes.push(entry);}
  save(); closeModal(); render(); toast(idx!==null?'Resume updated':'Resume added');
}

function deleteResume(idx){
  if(!confirm('Delete this resume?')) return;
  resumes.splice(idx,1); save(); render(); toast('Deleted');
}

// ── OVERLAY ──
function showOverlay(html){
  closeModal();
  const el=document.createElement('div');
  el.className='overlay'; el.id='modal-overlay';
  el.onclick=e=>{if(e.target===el)closeModal();};
  el.innerHTML=html;
  document.body.appendChild(el);
}
function closeModal(){const el=document.getElementById('modal-overlay');if(el)el.remove();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ── CSV / JSON ──
function exportCSV(){
  const data=getData(currentView);
  const h=['name','company','role','status','outreachDate','followUpDate','resume','nextStep','notes'];
  const rows=[h.join(','),...data.map(r=>h.map(k=>`"${(r[k]||'').replace(/"/g,'""')}"`).join(','))];
  dl(`${currentView}-${today()}.csv`,rows.join('\n'),'text/csv');
  toast('CSV exported');
}
function handleCSVImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const lines=ev.target.result.trim().split('\n');
      const headers=parseCSV(lines[0]);
      const entries=lines.slice(1).map(l=>{const v=parseCSV(l),o={id:uid()};headers.forEach((h,i)=>o[h.trim()]=(v[i]||'').trim());return o;}).filter(r=>r.name);
      getData(currentView).push(...entries); save(); render(); toast(`Imported ${entries.length}`);
    }catch{toast('Import failed');}
  };
  reader.readAsText(file); e.target.value='';
}
function parseCSV(line){const res=[];let cur='';let inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){res.push(cur);cur='';}else cur+=c;}res.push(cur);return res;}
function exportJSON(){dl(`jst-backup-${today()}.json`,JSON.stringify({contacts,applications,resumes,exportedAt:new Date().toISOString()},null,2),'application/json');toast('Backup saved');}
function handleJSONRestore(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.contacts)contacts=d.contacts;if(d.applications)applications=d.applications;if(d.resumes)resumes=d.resumes;save();render();toast('Restored');}catch{toast('Restore failed');}};reader.readAsText(file);e.target.value='';}
function dl(filename,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=filename;a.click();URL.revokeObjectURL(a.href);}

// ── INIT ──
render();
</script>
